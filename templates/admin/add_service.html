<!-- templates/admin/add_service.html -->
{% extends "admin/base_admin.html" %}

{% block title %}Добавить услугу{% endblock %}
{% block header %}Добавление новой услуги{% endblock %}

{% block content %}
<div class="card">
    <div class="card-body">
        <form method="POST" enctype="multipart/form-data">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Название услуги *</label>
                    <input type="text" name="title" class="form-control" required>
                </div>
                
                <div class="col-md-6 mb-3">
                    <label class="form-label">Категория *</label>
                    <select name="category" class="form-select" required>
                        <option value="printing">Печать</option>
                        <option value="photo_session">Фотосессии</option>
                        <option value="special_offers">Акции и предложения</option>
                    </select>
                </div>
                
                <div class="col-md-6 mb-3">
                    <label class="form-label">Подкатегория</label>
                    <input type="text" name="subcategory" class="form-control" 
                           placeholder="Например: Свадебная, Семейная">
                </div>
                
                <div class="col-md-3 mb-3">
                    <label class="form-label">Цена</label>
                    <input type="text" name="price_from" class="form-control" 
                           placeholder="от 50" required>
                </div>
                
                <div class="col-md-3 mb-3">
                    <label class="form-label">Период</label>
                    <input type="text" name="price_period" class="form-control" 
                           placeholder="BYN/час">
                </div>
                
                <div class="col-md-6 mb-3">
                    <label class="form-label">Цена для сортировки (число)</label>
                    <input type="number" step="0.01" name="price_value" class="form-control">
                    <small class="text-muted">Числовое значение цены для сортировки</small>
                </div>
                
                <div class="col-md-6 mb-3">
                    <label class="form-label">Текст кнопки</label>
                    <input type="text" name="order_button_text" class="form-control" 
                           value="Заказать">
                </div>
                
                <div class="col-12 mb-3">
                    <label class="form-label">Краткое описание (характеристики)</label>
                    <textarea name="features" class="form-control" rows="3" 
                              placeholder="Каждая характеристика с новой строки"></textarea>
                </div>
                
                <div class="col-12 mb-3">
                    <label class="form-label">Полное описание</label>
                    <textarea name="description" class="form-control" rows="5"></textarea>
                </div>
                
                <div class="col-md-6 mb-3">
                    <label class="form-label">Изображение</label>
                    <input type="file" name="image" class="form-control" accept="image/*">
                </div>
                
                <div class="col-md-6 mb-3">
                    <div class="form-check mt-4">
                        <input type="checkbox" name="is_popular" class="form-check-input" id="isPopular">
                        <label class="form-check-label" for="isPopular">Популярная услуга</label>
                    </div>
                </div>
                
                <div class="col-12">
                    <hr>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save"></i> Сохранить
                    </button>
                    <a href="{{ url_for('admin.services') }}" class="btn btn-secondary">
                        <i class="bi bi-x"></i> Отмена
                    </a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
